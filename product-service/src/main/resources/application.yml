server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://localhost:3307/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456


eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:demo_cloud_name}
  api_key: ${CLOUDINARY_API_KEY:1234567890}
  api_secret: ${CLOUDINARY_API_SECRET:demo_secret_key_12345}

cache:
  type: redis
  redis:
    time-to-live: 3600000  # 1 hour default in ms
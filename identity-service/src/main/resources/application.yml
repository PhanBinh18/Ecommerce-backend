server:
  port: 8081

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:mysql://localhost:3307/techstore_identity?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080 # C?ng duy nh?t mŕ Frontend s? g?i vŕo

spring:
  application:
    name: api-gateway # Tęn hi?n th? tręn b?ng ?i?u khi?n Eureka
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Cho phép Gateway t? ??ng těm các service khác thông qua Eureka

      # C?U HĚNH CÁC LU?NG ??NH TUY?N CHÍNH
      routes:
        - id: identity-service
          # lb = Load Balancer. Nó s? h?i Eureka: "identity-service ?ang ? IP/Port nŕo?" r?i chuy?n ??n ?ó
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/auth/**, /api/users/** # B?t k? request nŕo b?t ??u b?ng các path nŕy s? b? ??y sang Identity Service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Tr? v? t?ng ?ŕi Eureka